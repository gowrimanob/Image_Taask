<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
</head>

<style>
    img{
        height: 180px;
        width: 180px;
    }

    .img1{
        border: thin ridge grey;
        padding: 2px;
        outline: 1px solid red;
        outline-offset: 2px;
    }

    .img2{
        border: 3px dashed grey;
        padding: 2px;
        outline: 1px solid red;
        outline-offset: 2px;

        margin-left: 955px;
    }

    .img3{
        border: 3px groove blue;
        border-radius: 20px;
        padding: 2px;
        outline: 1px solid red;
        outline-offset: 2px;

        margin:0px 550px;
    }

    .img4{
        border: 3px inset gold;
        padding: 2px;
        outline: 1px outset gold;
        outline-offset: 2px;
    }

    .img5{
        border: 3px hidden grey;
        padding: 2px;
        outline: thin solid red;
        outline-offset: 2px;

        margin-left: 955px;
    }


</style>

<body>
    <img class="img1" src="./img1.jpg" alt="">

    <img class="img2" src="./img2.jpg" alt="">

    <img class="img3" src="./img3.jpg" alt="">

    <img class="img4" src="./img4.jpg" alt="">

    <img class="img5" src="./img5.jpg" alt="">

</body>
</html>
